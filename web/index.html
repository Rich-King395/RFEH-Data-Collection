<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P21XXCSR-EVB Capacitor Voltage Live Monitor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>P21XXCSR-EVB Capacitor Voltage Live Monitor</h1>
        <div class="subline">
          <span id="connectionDot" class="dot dot-off"></span>
          <span id="connectionText">Connecting</span>
          <span id="portText">COM3</span>
        </div>
      </div>
      <div class="toolbar">
        <label class="toggle">
          <input id="rawToggle" type="checkbox" checked />
          <span>Raw</span>
        </label>
        <label class="toggle">
          <input id="smoothToggle" type="checkbox" checked />
          <span>Smooth</span>
        </label>
        <label class="field">
          <span>Window</span>
          <select id="windowSelect">
            <option value="10">10 s</option>
            <option value="30">30 s</option>
            <option value="60" selected>60 s</option>
            <option value="180">180 s</option>
          </select>
        </label>
        <label class="field">
          <span>MA</span>
          <input id="smoothWindow" type="number" min="1" max="501" step="2" value="11" />
        </label>
      </div>
    </header>

    <section class="metrics" aria-label="Live metrics">
      <div class="metric">
        <span class="metric-label">Voltage</span>
        <strong id="voltageValue">--</strong>
      </div>
      <div class="metric">
        <span class="metric-label">ADC</span>
        <strong id="adcValue">--</strong>
      </div>
      <div class="metric">
        <span class="metric-label">Sample Rate</span>
        <strong id="rateValue">--</strong>
      </div>
      <div class="metric">
        <span class="metric-label">Samples</span>
        <strong id="sampleCount">0</strong>
      </div>
    </section>

    <section class="chart-panel">
      <canvas id="chartCanvas"></canvas>
      <div id="chartMessage" class="chart-message">Waiting for samples</div>
    </section>

    <footer class="footer">
      <span id="errorText"></span>
    </footer>
  </main>

  <script src="/static/app.js"></script>
</body>

</html>
